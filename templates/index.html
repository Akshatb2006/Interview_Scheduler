<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Scheduler</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Interview Scheduler</h1>
        <p class="subtitle">Find the perfect time slot for everyone</p>
    </header>

    <main>
        <section class="input-panels">
            <!-- Candidate Panel -->
            <div class="card candidate-card">
                <div class="card-header">
                    <h2>Candidate</h2>
                </div>
                <div class="card-body">
                    <input type="text" id="candidate-name" class="name-input" placeholder="Candidate name" value="Candidate">
                    <div id="candidate-slots" class="slots-container">
                        <div class="slot-row">
                            <select class="day-select">
                                <option value="Monday">Mon</option>
                                <option value="Tuesday" selected>Tue</option>
                                <option value="Wednesday">Wed</option>
                                <option value="Thursday">Thu</option>
                                <option value="Friday">Fri</option>
                                <option value="Saturday">Sat</option>
                                <option value="Sunday">Sun</option>
                            </select>
                            <input type="time" class="time-start" value="14:00">
                            <span class="time-sep">to</span>
                            <input type="time" class="time-end" value="17:00">
                            <button class="btn-icon btn-remove-slot" title="Remove">&times;</button>
                        </div>
                    </div>
                    <button class="btn-secondary btn-add-slot" data-target="candidate-slots">+ Add time slot</button>
                </div>
            </div>

            <!-- Interviewers Panel -->
            <div class="card interviewers-card">
                <div class="card-header">
                    <h2>Interviewers</h2>
                    <button class="btn-secondary btn-small" id="add-interviewer">+ Add</button>
                </div>
                <div class="card-body" id="interviewers-container">
                    <!-- Interviewer cards generated by JS -->
                </div>
            </div>
        </section>

        <!-- Controls -->
        <div class="controls">
            <div class="duration-control">
                <label for="min-duration">Minimum slot duration:</label>
                <select id="min-duration">
                    <option value="30">30 min</option>
                    <option value="45">45 min</option>
                    <option value="60" selected>60 min</option>
                    <option value="90">90 min</option>
                    <option value="120">120 min</option>
                </select>
            </div>
            <button class="btn-primary" id="find-slots">Find Best Slots</button>
        </div>

        <!-- Results -->
        <section class="results-section hidden" id="results">
            <div class="card recommendation-card" id="recommendation">
                <div class="card-header"><h2>Recommendation</h2></div>
                <div class="card-body" id="recommendation-body"></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>Top Suggested Slots</h2></div>
                <div class="card-body" id="top-slots"></div>
            </div>

            <div class="card conflicts-card" id="conflicts-section">
                <div class="card-header"><h2>Conflicts</h2></div>
                <div class="card-body" id="conflicts-body"></div>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
